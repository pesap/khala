name: triage-issue-workflow
version: 2
objective: Resolve a GitHub-reported bug end-to-end: root cause, TDD fix, and PR
version_control:
  local_tool: git
  setup_check: git status --short
  write_operations: use normal git commands with explicit scope and validation
steps:
  - id: capture
    action: capture_issue_or_problem_statement
  - id: investigate
    action: trace_code_paths_tests_and_recent_changes
  - id: root-cause
    action: identify_durable_fix_direction
  - id: plan
    action: draft_red_green_tdd_cycles
  - id: implement
    action: implement_fix_via_tdd_slices
  - id: validate
    action: run_targeted_checks
  - id: pr
    action: prepare_pr_with_problem_root_cause_fix_and_evidence
  - id: summarize
    action: report_pr_and_remaining_risks
  - id: learn
    action: persist_learnings
