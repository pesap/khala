name: workon-workflow
version: 2
objective: Bootstrap autonomous work from a clear, approved issue/work packet.

mutation_policy:
  allowed:
    - create_branch_or_worktree_when_ready_and_safe
    - write_session_capsule_when_ready
    - start_read_only_forge_feedback_ci_heartbeat_when_ready
  forbidden:
    - freeform_issue_creation
    - implementation_changes
    - merge_or_push
    - operator_pr_creation_for_implementation_work
    - bypassing_worktrunk_hook_approvals
    - github_comments_when_readiness_fails

inputs:
  target: issue URL or issue number
  repo: optional owner/repo override
  forge: auto, github, gitlab, or all
  mode: prepare or start
  heartbeat: forge feedback and CI polling interval in decimal hours (--heartbeat or --interval; default 0.0834, about five minutes)
  dryRun: boolean flag — prepare bootstrap capsule without launching the work session
  model: optional model override for the workon session
  extraInstruction: optional one-off maintainer focus

readiness_rubric:
  required_checks:
    - reproduction_or_observable_behavior
    - validation_or_test_plan
    - narrow_acceptance_criteria
    - repo_guideline_alignment
    - breaking_change_risk_resolved
    - review_size_likely_under_500_changed_loc
    - worth_doing_now
  failure_behavior: refuse_to_start_and_return_action_items_only

steps:
  - id: scope
    action: resolve_issue_repo_forge_and_mode
  - id: source-of-truth
    action: read_source_issue_work_packet
  - id: readiness
    action: evaluate_workon_readiness_before_bootstrap
  - id: blocked
    action: stop_with_action_items_when_readiness_fails
  - id: deterministic-bootstrap
    action: use_command_handler_issue_metadata_global_capsule_worktrunk_tab_wait_zellij_pi_handoff_and_forge_heartbeat_when_ready
  - id: branch
    action: derive_issue_numbered_branch_or_worktree_name
  - id: bootstrap
    action: create_branch_or_worktree_only_when_ready_safe_and_authorized
  - id: capsule
    action: write_or_propose_session_capsule
  - id: handoff
    action: report_next_command_and_open_questions
  - id: learn
    action: persist_reusable_non_sensitive_learnings
