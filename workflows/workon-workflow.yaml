name: workon-workflow
version: 1
objective: Bootstrap an issue-first, focused work session from an issue, PR, or topic.

mutation_policy:
  allowed:
    - create_issue_when_needed_and_repo_is_clear
    - create_branch_or_worktree_when_safe
    - write_session_capsule
    - start_read_only_forge_feedback_heartbeat
  forbidden:
    - implementation_changes
    - merge_or_push
    - pr_creation_for_implementation_work
    - bypassing_worktrunk_hook_approvals

inputs:
  target: issue URL, PR URL, issue number, or freeform topic
  repo: optional owner/repo override
  forge: auto, github, gitlab, or all
  mode: prepare or start
  heartbeat: forge feedback polling interval in decimal hours (--heartbeat or --interval)
  extraInstruction: optional one-off maintainer focus

steps:
  - id: scope
    action: resolve_target_repo_forge_and_mode
  - id: deterministic-bootstrap
    action: use_command_handler_issue_metadata_global_capsule_worktrunk_tab_wait_zellij_pi_handoff_and_forge_heartbeat_before_model_exploration_when_available
  - id: source-of-truth
    action: find_or_prepare_source_issue
  - id: branch
    action: derive_issue_numbered_branch_or_worktree_name
  - id: bootstrap
    action: create_branch_or_worktree_only_when_safe_and_authorized
  - id: capsule
    action: write_or_propose_session_capsule
  - id: handoff
    action: report_next_command_and_open_questions
  - id: learn
    action: persist_reusable_non_sensitive_learnings
