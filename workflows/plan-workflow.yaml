name: plan-workflow
version: 1
objective: Build a rigorous implementation plan with edge cases, domain alignment, and captured decisions
version_control:
  local_tool: git
  setup_check: git status --short
  write_operations: use normal git commands with explicit scope and validation
steps:
  - id: intake
    action: capture_plan_and_scope
  - id: discover
    action: locate_context_docs_and_relevant_code
  - id: question-loop
    action: ask_only_blocking_questions_after_inspecting_available_context
  - id: reconcile
    action: resolve_terminology_conflicts_and_code_contradictions
  - id: update-context
    action: update_context_docs_inline_as_terms_resolve
  - id: adr
    action: propose_or_write_adrs_only_when_criteria_met
  - id: summarize
    action: list_resolved_terms_open_questions_and_risks
  - id: learn
    action: persist_learnings
