name: debug-workflow
version: 1
objective: Gather evidence and prepare an issue-ready debugging brief
version_control:
  local_tool: git
  setup_check: git status --short
  write_operations: do not mutate code during debug; create an issue draft instead
steps:
  - id: intake
    action: restate_problem
  - id: evidence
    action: collect_reproduction_or_signals
  - id: hypotheses
    action: generate_ranked_hypotheses
  - id: hypothesis-analysis
    action: test_hypotheses_with_evidence
  - id: synthesis
    action: rank_findings_and_select_root_cause_or_candidate
  - id: issue-brief
    action: draft_issue_title_body_acceptance_criteria_and_validation_plan
  - id: learn
    action: persist_learnings
