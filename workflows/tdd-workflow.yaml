name: tdd-workflow
version: 2
objective: Deliver features via behavior-first red-green-refactor with implementation, tests, docs, and validation
version_control:
  local_tool: git
  setup_check: git status --short
  write_operations: use normal git commands with explicit scope and validation
steps:
  - id: clarify
    action: extract_acceptance_criteria
  - id: plan
    action: define_behavior_and_public_interface
  - id: red
    action: write_one_failing_behavior_test
  - id: green
    action: implement_minimal_change_to_pass
  - id: refactor
    action: improve_design_while_staying_green
  - id: docs
    action: update_or_add_docs_for_user_visible_behavior
  - id: validate
    action: run_targeted_checks
  - id: summarize
    action: report_delivered_scope_cycle_status_and_next_slice
  - id: learn
    action: persist_learnings
