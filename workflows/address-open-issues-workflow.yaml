name: address-open-issues-workflow
version: 2
objective: Resolve actionable open issues authored by current user through triage, readiness checks, review, simplify, and remediation loops
version_control:
  local_tool: git
  setup_check: git status --short
  write_operations: use normal git commands with explicit scope and validation
steps:
  - id: list-issues
    action: fetch_open_issues_authored_by_current_user
  - id: filter-blocked
    action: skip_issues_with_blocked_label
  - id: description-quality-gate
    action: request_clarification_and_abort_issue_pipeline_when_description_is_unclear
  - id: for-each-actionable-issue
    action: execute_issue_pipeline
    parameters:
      stages:
        - triage
        - workon_readiness_check
        - review
        - simplify
        - review
        - address_review_findings
      max_remediation_loops: 2
  - id: summarize
    action: produce_issue_status_table_and_counts
  - id: learn
    action: persist_learnings
