version: 1

quality:
  # Workflows below this confidence are tracked for follow-up in teardown summaries.
  low_confidence_threshold: 0.7

harness:
  # Keep startup context small for provider prompt-cache reuse; use khala_search_memory for task-specific recall.
  bootstrap_memory_tail_lines: 8
  bootstrap_runtime_rules: 8
  # Substantial tool fanout or repeated failures force stronger harness behavior.
  substantial_tool_call_threshold: 4
  tool_failure_escalation_threshold: 3

first_principles:
  # Used as defaults before first-principles-gate.yaml overrides are applied.
  preflight_mode: warn
  postflight_mode: warn
  response_compliance: warn

commands:
  debug:
    enabled: true
    prompt: debug-workflow.md
    workflow: debug-workflow.yaml
  feature:
    enabled: true
    prompt: feature-workflow.md
    workflow: feature-workflow.yaml
  review:
    enabled: true
    prompt: review-workflow.md
    workflow: review-workflow.yaml
  git-review:
    enabled: true
    prompt: git-review-workflow.md
    workflow: git-review-workflow.yaml
  simplify:
    enabled: true
    prompt: simplify-workflow.md
    workflow: simplify-workflow.yaml
  ship:
    enabled: true
    prompt: ship-workflow.md
    workflow: ship-workflow.yaml
  inbox:
    enabled: true
    prompt: inbox-workflow.md
    workflow: inbox-workflow.yaml
  plan:
    enabled: true
    prompt: plan-workflow.md
    workflow: plan-workflow.yaml
  audit:
    enabled: true
    prompt: audit-workflow.md
    workflow: audit-workflow.yaml
  triage-issue:
    enabled: true
    prompt: triage-issue-workflow.md
    workflow: triage-issue-workflow.yaml
  tdd:
    enabled: true
    prompt: tdd-workflow.md
    workflow: tdd-workflow.yaml
  address-open-issues:
    enabled: true
    prompt: address-open-issues-workflow.md
    workflow: address-open-issues-workflow.yaml
  learn-skill:
    enabled: true
    prompt: learn-skill-workflow.md
    workflow: learn-skill-workflow.yaml
