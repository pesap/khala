name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript checks and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:node

  setup-helper-windows:
    name: Setup helper focused tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run focused setup-helper tests
        run: >-
          node --test --test-concurrency=1 --experimental-strip-types
          --test-name-pattern="khala CLI reports discovery fallback when pi is
          unavailable in dry-run mode|khala CLI shows discovered models in
          non-interactive --yes dry-run mode when pi is available|khala setup
          helper preserves pi install arguments on Windows shims"
          tests/runtime/khala-cli.test.ts

  github-package-smoke:
    name: GitHub package smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KHALA_PACKAGE_REPO: >-
        ${{ github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name || github.repository }}
      KHALA_PACKAGE_REF: >-
        ${{ github.event_name == 'pull_request' &&
        github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Smoke setup helper from GitHub package ref
        run: |
          set -euo pipefail
          package="github:${KHALA_PACKAGE_REPO}#${KHALA_PACKAGE_REF}"
          npm exec --yes --package "$package" -- khala --help
          npm exec --yes --package "$package" -- khala --global --dry-run --yes

  prek:
    name: prek checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest /usr/local/bin
          echo "/usr/local/bin" >>"$GITHUB_PATH"

      - name: Run prek hooks
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2
